path:
  ckpt_path: "/srv/scratch/speechdata/jinghao/fastSpeech2_result/output/ckpt/SPAC_subset001/${SAPC_SPEAKER}"
  log_path: "/srv/scratch/speechdata/jinghao/fastSpeech2_result/output/log/SPAC_subset001/${SAPC_SPEAKER}"
  result_path: "/srv/scratch/speechdata/jinghao/fastSpeech2_result/output/result/SPAC_subset001/${SAPC_SPEAKER}"

data_loader:
  num_workers: 2
  pin_memory: True
  prefetch_factor: 2

logging:
  use_vocoder: True

optimizer:
  batch_size: 16
  betas: [0.9, 0.98]
  eps: 0.000000001
  weight_decay: 0.0
  grad_clip_thresh: 1.0
  grad_acc_step: 1
  warm_up_step: 4000
  anneal_steps: [300000, 400000, 500000]
  anneal_rate: 0.3

step:
  total_step: 900000
  log_step: 100
  synth_step: 1000
  val_step: 1000
  save_step: 100000
